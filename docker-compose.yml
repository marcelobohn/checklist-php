# =====================================================================
# Ambiente para rodar o projeto legado "como está", sem mexer no fonte.
#
# conexaoBD.php usa mysql_connect('localhost:3306', 'root', '123'). Na API
# mysql_*, o host 'localhost' significa conexão via SOCKET Unix (a porta é
# ignorada) — exatamente como era no servidor LAMP único original. Por isso
# compartilhamos o diretório do socket do MySQL com o container web através
# do volume `mysqlsock`. Nenhuma linha do fonte original precisa mudar.
#
# O código espera ser servido em http://localhost/checklist/ (ver o
# $EnderecoBase fixo em template/lateral.php e o block.php que valida o
# SERVER_NAME). Por isso montamos o projeto no subdiretório `checklist/`
# e publicamos na porta 80 do host — assim TODOS os links do menu e o
# anti-hotlink funcionam sem alterar uma linha do fonte.
#
# Acesse depois de subir:  http://localhost/checklist/
# Login: admin / admin
# =====================================================================
services:
  db:
    image: mysql:5.7
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --socket=/var/run/mysqld/mysqld.sock
    environment:
      MYSQL_ROOT_PASSWORD: "123"      # mesma senha do conexaoBD.php original
      MYSQL_DATABASE: "checklist"
    volumes:
      - ./docker/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - dbdata:/var/lib/mysql
      - mysqlsock:/var/run/mysqld      # socket compartilhado com o web
    ports:
      - "3307:3306"    # MySQL exposto no host em 3307 (opcional, p/ debug)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: ./docker
    volumes:
      - ./:/var/www/html/checklist     # servido em http://localhost/checklist/
      - mysqlsock:/var/run/mysqld      # enxerga o socket do MySQL via 'localhost'
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  mysqlsock:
