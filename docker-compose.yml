# =====================================================================
# Ambiente para rodar o projeto legado "como está", sem mexer no fonte.
#
# conexaoBD.php conecta via PDO lendo as variáveis DB_* (com defaults de
# dev). Com DB_HOST=localhost, o PDO usa SOCKET Unix; por isso compartilhamos
# o diretório do socket do MySQL com o container web pelo volume `mysqlsock`.
# A senha tem fonte única (${DB_PASSWORD:-123}), usada tanto no MySQL quanto
# no web — sobrescreva exportando DB_PASSWORD (ou via arquivo .env).
#
# O código espera ser servido em http://localhost/checklist/ (ver o
# $EnderecoBase fixo em template/lateral.php e o block.php que valida o
# SERVER_NAME). Por isso montamos o projeto no subdiretório `checklist/`
# e publicamos na porta 80 do host — assim TODOS os links do menu e o
# anti-hotlink funcionam sem alterar uma linha do fonte.
#
# Acesse depois de subir:  http://localhost/checklist/
# Login: admin / admin
# =====================================================================
services:
  db:
    image: mysql:5.7
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --socket=/var/run/mysqld/mysqld.sock
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-123}"
      MYSQL_DATABASE: "${DB_NAME:-checklist}"
    volumes:
      - ./db:/db:ro                    # migrations + seeds (usados pelo initdb)
      - ./docker/initdb.sh:/docker-entrypoint-initdb.d/10-initdb.sh:ro
      - dbdata:/var/lib/mysql
      - mysqlsock:/var/run/mysqld      # socket compartilhado com o web
    ports:
      - "3307:3306"    # MySQL exposto no host em 3307 (opcional, p/ debug)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-123}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: ./docker
    environment:
      DB_HOST: "${DB_HOST:-localhost}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME:-checklist}"
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-123}"
    volumes:
      - ./:/var/www/html/checklist     # servido em http://localhost/checklist/
      - mysqlsock:/var/run/mysqld      # enxerga o socket do MySQL via 'localhost'
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  mysqlsock:
